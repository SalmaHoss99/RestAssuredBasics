name: Build Test Release

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '19'

      - name: Build project
        run: mvn -DskipTests package

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 19
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '19'

      - name: Check Java and Maven versions
        run: |
          java -version
          mvn -v

      - name: Run tests
        run: mvn test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Release
        run: echo "Release job started after build and test passed"